databases:
  - name: cotadise-postgresql
    databaseName: cotadise
    user: cotadise
    plan: free

services:
  - type: web
    name: cotadise-api
    runtime: docker
    plan: free
    rootDir: cotadise-backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cotadise-postgresql
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_SECRET
        generateValue: true
      - key: WAVE_CONFIG_ENCRYPTION_KEY
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: DEMO_SEED_ENABLED
        value: "false"
      - key: EMAIL_DISPATCH_ENABLED
        value: "false"
      - key: EMAIL_DISPATCH_INTERVAL_MS
        value: "60000"
      - key: EMAIL_DISPATCH_BATCH_SIZE
        value: "25"
      - key: PUBLIC_MOBILE_APP_NAME
        value: CotaDISE
      - key: PUBLIC_BACKEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: cotadise-admin
    runtime: static
    rootDir: cotadise-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
